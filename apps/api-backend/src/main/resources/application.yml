spring:
  application:
    name: MyFinanceManager API
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mfm_db}
    username: ${DB_USERNAME:mfm_user}
    password: ${DB_PASSWORD:mfm_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:myfinance-manager-secret-key-for-development-only-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
  token-prefix: "Bearer "
  header: "Authorization"

# Logging
logging:
  level:
    root: INFO
    com.myfinancemanager: DEBUG
    org.springframework.security: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always